name: Build Tauri App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x64
          - os: macos-15
            target: universal-apple-darwin
            name: macos-universal
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Add Rust targets
        shell: bash
        run: |
          if [ "${{ matrix.platform.target }}" = "universal-apple-darwin" ]; then
            rustup target add x86_64-apple-darwin aarch64-apple-darwin
          else
            rustup target add "${{ matrix.platform.target }}"
          fi

      - name: Install dependencies (Ubuntu)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build
        run: npm run tauri build -- --target ${{ matrix.platform.target }}

      - name: List build output
        if: always()
        run: |
          echo "Bundle directory structure:"
          ls -R "src-tauri/target/${{ matrix.platform.target }}/release/bundle" || echo "No bundle directory found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: pomodoro-cat-${{ matrix.platform.name }}
          path: src-tauri/target/${{ matrix.platform.target }}/release/bundle/
          if-no-files-found: warn

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') && success()
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          generate_release_notes: false
          files: |
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}