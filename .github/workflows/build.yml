name: Build Tauri App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x64
          - os: macos-13
            target: x86_64-apple-darwin
            name: macos-x64-intel
          - os: macos-14
            target: aarch64-apple-darwin
            name: macos-arm64-apple
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build
        run: npm run tauri build

      - name: Check build output (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          echo "Build directory structure:"
          ls -R src-tauri/target/release/bundle/ | head -30
          echo "Looking for DMG files:"
          find src-tauri/target/release/bundle -name "*.dmg" || echo "No DMG found"
          echo "Looking for APP files:"
          find src-tauri/target/release/bundle -name "*.app" || echo "No APP found"

      - name: Check build output (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "Build directory structure:"
          Get-ChildItem -Path src-tauri\target\release\bundle -Recurse | Select-Object -First 30
          echo "Looking for installer files:"
          Get-ChildItem -Path src-tauri\target\release\bundle -Recurse -Include *.msi,*.exe
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pomodoro-cat-${{ matrix.platform.name }}
          path: |
            src-tauri/target/release/bundle/dmg/
            src-tauri/target/release/bundle/deb/
            src-tauri/target/release/bundle/appimage/
            src-tauri/target/release/bundle/macos/
            src-tauri/target/release/bundle/msi/
            src-tauri/target/release/bundle/nsis/
          if-no-files-found: warn

      - name: Release (only for tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}