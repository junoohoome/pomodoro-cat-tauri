name: Build Tauri App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x64
          - os: macos-13
            target: x86_64-apple-darwin
            name: macos-x64-intel
          - os: macos-14
            target: aarch64-apple-darwin
            name: macos-arm64-apple
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Check build environment
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Rust version: $(rustc --version)"
          echo "Cargo version: $(cargo --version)"
          echo "Current directory: $(pwd)"
          echo "Directory contents:"
          ls -la

      - name: Build
        run: npm run tauri build

      - name: Check build output
        if: always()
        run: |
          echo "Build output structure:"
          find src-tauri/target/release/bundle -type f -o -type d | head -20
          echo "DMG files:"
          find src-tauri/target/release/bundle -name "*.dmg" -o -name "*.app" || echo "No DMG or app files found"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pomodoro-cat-${{ matrix.platform.name }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Create macOS app zip for release
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform.os == 'macos-13'
        run: |
          cd src-tauri/target/release/bundle/macos
          zip -r pomodoro-cat-tauri.app.zip pomodoro-cat-tauri.app

      - name: Create macOS app zip for release (ARM64)
        if: startsWith(github.ref, 'refs/tags/') && matrix.platform.os == 'macos-14'
        run: |
          cd src-tauri/target/release/bundle/macos
          zip -r pomodoro-cat-tauri.app.zip pomodoro-cat-tauri.app

      - name: Release (only for tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/macos/*.app.zip
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}